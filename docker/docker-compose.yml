# ============================================
# LLM微调框架 - Docker Compose配置
# ============================================

version: '3.8'

services:
  # 训练服务
  train:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: llm-finetune-framework:latest
    container_name: llm-train
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ../data:/workspace/data
      - ../outputs:/workspace/outputs
      - ../configs:/workspace/configs
      - ../scripts:/workspace/scripts
      - huggingface_cache:/root/.cache/huggingface
    working_dir: /workspace
    command: >
      bash -c "
        python scripts/prepare_data.py --input data/examples/customer_service.json --output_dir data/processed &&
        python scripts/train_swift.py --config configs/swift/qwen_lora.yaml --merge_after_train
      "
    networks:
      - llm-network

  # API服务
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: llm-finetune-framework:latest
    container_name: llm-api
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "8000:8000"
    volumes:
      - ../outputs/merged:/workspace/model:ro
      - huggingface_cache:/root/.cache/huggingface
    working_dir: /workspace
    command: >
      bash -c "
        python scripts/start_api.py 
        --model_path /workspace/model 
        --host 0.0.0.0 
        --port 8000
        --load_in_4bit
      "
    networks:
      - llm-network
    depends_on:
      - train
    restart: unless-stopped

  # Web UI服务（LLaMA-Factory）
  webui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: llm-finetune-framework:latest
    container_name: llm-webui
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    ports:
      - "7860:7860"
    volumes:
      - ../data:/workspace/data
      - ../outputs:/workspace/outputs
      - huggingface_cache:/root/.cache/huggingface
    working_dir: /workspace
    command: >
      bash -c "
        llamafactory-cli webui
      "
    networks:
      - llm-network
    restart: unless-stopped

# 数据卷
volumes:
  huggingface_cache:
    driver: local

# 网络
networks:
  llm-network:
    driver: bridge
